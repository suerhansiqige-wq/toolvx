<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i18n Test Page</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test-item { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
    </style>
</head>
<body>
    <h1>i18n System Test</h1>
    
    <div class="test-item">
        <strong>Browser Language:</strong> <span id="browserLang"></span>
    </div>
    
    <div class="test-item">
        <strong>Navigator Languages:</strong> <span id="navLangs"></span>
    </div>
    
    <div class="test-item">
        <strong>Detected Language:</strong> <span id="detectedLang"></span>
    </div>
    
    <div class="test-item">
        <h3>Translation Tests:</h3>
        <p data-i18n="nav.home">Home</p>
        <p data-i18n="nav.blog">Blog</p>
        <p data-i18n="hero.title">Hero Title</p>
        <p data-i18n="footer.description">Footer Description</p>
    </div>
    
    <script src="js/i18n.js"></script>
    <script>
        // Display browser language info
        document.getElementById('browserLang').textContent = navigator.language || navigator.userLanguage;
        document.getElementById('navLangs').textContent = navigator.languages ? navigator.languages.join(', ') : 'Not available';
        
        // Wait for i18n to initialize
        setTimeout(() => {
            document.getElementById('detectedLang').textContent = localStorage.getItem('preferred_language') || 'Not set';
        }, 100);
    </script>
</body>
</html>
